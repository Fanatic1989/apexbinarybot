services:
  - type: web
    name: apex-binary-bot
    runtime: python
    pythonVersion: "3.11.9"
    build:
      apt:
        packages:
          - chromium                     # correct package name
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DERIV_APP_ID
        sync: false
      - key: DEMO_TOKEN
        sync: false
      - key: LIVE_TOKEN
        sync: false
      - key: MODE
        value: demo
      - key: SCAN_INTERVAL
        value: "60"
      - key: STAKE_PERCENT
        value: "1.0"
      - key: MAX_DAILY_LOSS_PCT
        value: "10.0"
      - key: MAX_CONSECUTIVE_LOSS
        value: "3"
      - key: DAILY_PROFIT_TARGET
        value: "5.0"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CURRENCY
        value: "USD"
      - key: COMPOUND
        value: "false"
      - key: COMPOUND_PERCENT
        value: "50"
      - key: STAKING_STRATEGY
        value: "flat"
      - key: LOG_LEVEL
        value: "INFO"
      - key: SIGNAL_ONLY
        value: "false"
      # CHROME_BIN is removed; the scraper will find /usr/bin/chromium automatically
